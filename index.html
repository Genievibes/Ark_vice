<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아크바이스 - 모코콩</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8e4de; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Nunito',sans-serif; }

  /* ── 기기 전체 ── */
  .device-wrapper { position:relative; width:600px; height:340px; }
  .device-body { position:absolute; inset:0; background:#C5DE92; border-radius:44px;
    box-shadow:0 0 0 3px #a8c470, 0 16px 48px rgba(0,0,0,0.28),
      inset 0 3px 8px rgba(255,255,255,0.52), inset 0 -4px 10px rgba(0,0,0,0.14); }
  .device-body::before { content:''; position:absolute; inset:0; border-radius:44px;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 11px,rgba(0,0,0,0.03) 11px,rgba(0,0,0,0.03) 12px),
      repeating-linear-gradient(90deg,transparent,transparent 23px,rgba(0,0,0,0.03) 23px,rgba(0,0,0,0.03) 24px);
    pointer-events:none; }
  .device-face { position:absolute; inset:13px; background:linear-gradient(160deg,#cfe89e 0%,#b8d47c 60%,#a9c86a 100%);
    border-radius:33px; box-shadow:inset 0 2px 5px rgba(255,255,255,0.5), inset 0 -2px 5px rgba(0,0,0,0.1); }

  /* ── 베젤 & 스크린 ── */
  .screen-bezel { position:absolute; top:50%; left:54px; transform:translateY(-50%);
    width:400px; height:272px; background:#E85A10; border-radius:18px;
    box-shadow:0 6px 24px rgba(232,90,16,0.55), inset 0 2px 4px rgba(255,255,255,0.25), inset 0 -3px 6px rgba(0,0,0,0.28);
    display:flex; align-items:center; justify-content:center; }
  .screen { width:364px; height:248px; background:#dcefc4; border-radius:10px;
    border:2px solid #3a5010; overflow:hidden; position:relative; display:flex; flex-direction:column; }

  /* ── STAT BAR ── */
  .stat-bar { width:100%; height:46px; flex-shrink:0; background:rgba(40,70,10,0.10);
    border-bottom:1.5px solid rgba(40,70,10,0.18); display:flex; align-items:center; padding:0 10px; gap:7px; }
  .badge-box { display:flex; flex-direction:column; align-items:center; gap:1px; flex-shrink:0; min-width:32px; }
  .badge-label { font-size:6px; font-weight:900; color:rgba(30,55,8,0.55); letter-spacing:.8px; }
  .badge-value { font-size:14px; font-weight:900; color:rgba(30,55,8,0.85); line-height:1; }
  .badge-sub { font-size:6px; color:rgba(30,55,8,0.45); }
  .vdiv { width:1px; height:28px; background:rgba(40,70,10,0.15); flex-shrink:0; }
  .stat-item { display:flex; flex-direction:column; align-items:flex-start; gap:3px; flex:1; min-width:0; }
  .stat-hd { display:flex; align-items:center; gap:3px; width:100%; justify-content:space-between; }
  .stat-ico { font-size:9px; line-height:1; }
  .stat-hd-left { display:flex; align-items:center; gap:3px; }
  .stat-nm { font-size:6.5px; font-weight:900; color:rgba(30,55,8,0.65); white-space:nowrap; }
  .stat-num { font-size:6.5px; font-weight:900; color:rgba(30,55,8,0.80); margin-left:auto; }
  .stat-track { width:100%; height:6px; background:rgba(40,70,10,0.14); border-radius:3px; overflow:hidden; }
  .stat-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
  .fill-hunger { background:linear-gradient(90deg,#f4a030,#f0c050); }
  .fill-health { background:linear-gradient(90deg,#48c860,#80e890); }
  .hearts { display:flex; gap:2px; align-items:center; }
  .affection-row { display:flex; align-items:center; gap:4px; width:100%; }
  .aff-stage-badge { font-size:5.5px; font-weight:900; color:#72243e;
    background:#f4c0d1; border-radius:4px; padding:1px 4px;
    white-space:nowrap; flex-shrink:0; }
  .aff-mini-track { flex:1; height:4px; background:rgba(40,70,10,0.14);
    border-radius:2px; overflow:hidden; }
  .aff-mini-fill { height:100%; background:#f05080;
    border-radius:2px; transition:width 0.4s ease; width:0%; }
  /* 반개 하트 */
  .heart-wrap { position:relative; width:9px; height:9px; display:inline-block; flex-shrink:0; }
  .heart-bg   { position:absolute; inset:0; font-size:9px; line-height:1;
    color:rgba(40,70,10,0.18); }
  .heart-fill { position:absolute; inset:0; font-size:9px; line-height:1;
    color:#f05080; overflow:hidden; width:0%; transition:width 0.35s ease; }
  .heart { font-size:8px; line-height:1; transition:color 0.3s; }
  .heart.on { color:#f05080; }
  .heart.off { color:rgba(40,70,10,0.20); }
  /* 교감 배지 */
  .daily-box { display:flex; flex-direction:column; align-items:center; gap:1px; flex-shrink:0; min-width:36px;
    border-radius:6px; padding:2px 4px; }
  .daily-label { font-size:6px; font-weight:900; color:rgba(30,55,8,0.55); letter-spacing:.8px; }
  .daily-val { font-size:14px; font-weight:900; color:#f05080; line-height:1; }
  .daily-sub { font-size:6px; color:rgba(30,55,8,0.45); }

  /* ── SCREEN BODY ── */
  .screen-body { flex:1; display:flex; overflow:hidden; }

  /* SIDEBAR */
  .sidebar { width:66px; height:100%; background:rgba(40,70,10,0.10);
    border-right:1.5px solid rgba(40,70,10,0.14); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px; flex-shrink:0; }
  .menu-item { width:56px; height:52px; border-radius:10px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3px; cursor:pointer;
    transition:background 0.15s, transform 0.1s, opacity 0.2s; position:relative; user-select:none; }
  .menu-item:hover:not(.disabled) { background:rgba(40,70,10,0.12); transform:scale(1.04); }
  .menu-item.active { background:rgba(40,70,10,0.18); }
  .menu-item.active::before { content:''; position:absolute; left:0; top:20%; bottom:20%;
    width:3px; border-radius:0 2px 2px 0; background:rgba(40,70,10,0.55); }
  .menu-item.disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .menu-icon { font-size:18px; line-height:1; }
  .menu-label { font-size:6.5px; font-weight:900; color:rgba(30,55,8,0.72); white-space:nowrap; }
  .menu-item.active .menu-label { color:rgba(30,55,8,0.95); }
  .menu-divider { width:38px; height:1px; background:rgba(40,70,10,0.12); }

  /* ── MAIN CONTENT ── */
  .screen-content { flex:1; height:100%; position:relative; overflow:hidden; }
  .sky-bg { position:absolute; inset:0; background:linear-gradient(180deg,#c8e890 0%,#d8f0a0 40%,#e0f4b0 70%,#c8e080 100%); transition:background 0.8s; }
  .ground { position:absolute; bottom:0; left:0; right:0; height:44px;
    background:linear-gradient(180deg,#7ab830 0%,#6aa020 100%); z-index:2; }
  .ground::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:#8acc40; }
  .sun { position:absolute; top:10px; right:18px; width:24px; height:24px;
    background:radial-gradient(circle at 40% 40%,#fff8a0,#f0d030); border-radius:50%;
    box-shadow:0 0 16px rgba(240,208,40,0.6); }
  .cloud { position:absolute; background:rgba(255,255,255,0.7); border-radius:20px; }
  .cloud::before,.cloud::after { content:''; position:absolute; background:rgba(255,255,255,0.7); border-radius:50%; }
  .cloud-1 { top:16px; left:10px; width:38px; height:12px; }
  .cloud-1::before { width:17px; height:17px; top:-10px; left:5px; }
  .cloud-1::after { width:14px; height:14px; top:-7px; left:17px; }
  .cloud-2 { top:28px; left:70px; width:28px; height:9px; }
  .cloud-2::before { width:13px; height:13px; top:-8px; left:4px; }
  .cloud-2::after { width:10px; height:10px; top:-5px; left:14px; }
  .tree { position:absolute; bottom:42px; }
  .tree-trunk { width:8px; height:15px; background:linear-gradient(90deg,#7a4820,#a06030); border-radius:2px; margin:0 auto; }
  .tree-top { width:0; height:0; border-left:18px solid transparent; border-right:18px solid transparent; border-bottom:27px solid #4a9020; margin:0 auto -6px; }
  .tree-top2 { width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-bottom:22px solid #5aa030; margin:0 auto -4px; }
  .tree-l { left:5px; transform:scale(0.85); transform-origin:bottom left; }
  .tree-r { right:5px; transform:scale(0.80); transform-origin:bottom right; }

  /* ── 캐릭터 ── */
  .char-wrap { position:absolute; bottom:44px; left:50%; transform:translateX(-50%);
    width:86px; height:108px; animation:float 2.2s ease-in-out infinite; z-index:5; }
  .char-wrap img { width:100%; height:100%; object-fit:contain; }
  @keyframes float { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }
  .char-shadow { position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    width:44px; height:10px; background:rgba(40,80,10,0.20); border-radius:50%;
    animation:shadow-a 2.2s ease-in-out infinite; z-index:4; }
  @keyframes shadow-a { 0%,100%{transform:translateX(-50%) scaleX(1);opacity:.20} 50%{transform:translateX(-50%) scaleX(0.65);opacity:.10} }

  /* 탐험 오버레이 */
  .explore-overlay, .explore-return {
    position:absolute; inset:0; z-index:18;
    background:rgba(20,40,8,0.88);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:6px; border-radius:8px;
    padding:10px;
  }
  .explore-overlay.hidden, .explore-return.hidden { display:none; }
  .explore-log {
    font-size:7.5px; font-weight:800;
    color:#c8f050; letter-spacing:.8px;
    text-align:center; line-height:1.8;
    white-space:pre-line;
  }

  /* 탐험 중 텍스트 */
  .exploring-msg { position:absolute; bottom:44px; left:50%; transform:translateX(-50%);
    z-index:6; background:rgba(30,55,8,0.80); color:#c8f050;
    font-size:9px; font-weight:900; letter-spacing:1.5px;
    padding:6px 14px; border-radius:10px; white-space:nowrap;
    display:none; }
  .dot-anim::after { content:''; animation:dots 1.4s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:''} }

  /* 토스트 */
  .toast { position:absolute; top:6px; left:50%; transform:translateX(-50%);
    background:rgba(30,55,8,0.85); color:#c8f050;
    font-size:7.5px; font-weight:900; letter-spacing:1.5px;
    padding:4px 12px; border-radius:8px; white-space:nowrap;
    opacity:0; transition:opacity 0.25s; z-index:30; pointer-events:none; }
  .toast.show { opacity:1; }

  /* 보상 팝업 */
  .reward-popup { position:absolute; inset:0; z-index:25; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px;
    background:rgba(200,240,100,0.92); border-radius:8px;
    opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .reward-popup.show { opacity:1; pointer-events:auto; }

  .reward-title { font-size:11px; font-weight:900; color:rgba(30,55,8,0.9); letter-spacing:1px; }
  .reward-items { font-size:8px; font-weight:700; color:rgba(30,55,8,0.75); }
  .reward-sub { font-size:8px; font-weight:700; color:rgba(30,55,8,0.75); }

  /* 애니메이션 */
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
  .shake { animation:shake 0.35s ease; }
  @keyframes popIn { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
  .pop { animation:popIn 0.22s ease; }
  @keyframes burst { 0%{transform:translateX(-50%) scale(1);filter:brightness(1);opacity:1}
    40%{transform:translateX(-50%) scale(1.4);filter:brightness(15) saturate(0);opacity:1}
    100%{transform:translateX(-50%) scale(1);filter:brightness(1);opacity:0} }
  @keyframes emerge { 0%{transform:translateX(-50%) scale(0.3);filter:brightness(20) saturate(0);opacity:0.2}
    50%{transform:translateX(-50%) scale(1.15);filter:brightness(4);opacity:0.8}
    100%{transform:translateX(-50%) scale(1);filter:brightness(1);opacity:1} }
  @keyframes flashScreen { 0%,100%{opacity:0} 30%,70%{opacity:0.9} }

  /* ── 씨앗 화면 (intro) ── */
  .intro-screen { position:absolute; inset:0; z-index:40; background:#dcefc4;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-radius:8px; }
  .intro-screen.hidden { display:none; }
  .seed-img { width:72px; height:76px; object-fit:contain;
    animation:seedFloat 2s ease-in-out infinite; }
  @keyframes seedFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .seed-title { font-size:9px; font-weight:900; color:rgba(30,55,8,0.8); letter-spacing:1px; }
  .water-btn { background:linear-gradient(135deg,#48a8e8,#80c8f8);
    color:white; font-size:8px; font-weight:900; letter-spacing:1px;
    border:none; border-radius:12px; padding:6px 16px; cursor:pointer;
    box-shadow:0 3px 8px rgba(72,168,232,0.45); transition:transform 0.1s; }
  .water-btn:hover { transform:scale(1.06); }
  .water-btn:active { transform:scale(0.96); }
  .flash-overlay { position:absolute; inset:0; background:white; opacity:0; pointer-events:none; border-radius:8px; z-index:50; }

  /* ── 시작 화면 ── */
  .start-screen { position:absolute; inset:0; z-index:50; background:#dcefc4;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; border-radius:8px; }
  .start-screen.hidden { display:none; }
  .start-title { font-size:11px; font-weight:900; color:rgba(30,55,8,0.85); letter-spacing:2px; }
  .start-sub { font-size:7.5px; color:rgba(30,55,8,0.55); letter-spacing:1px; }
  .start-btn { background:linear-gradient(135deg,#6adc38,#a0f060);
    color:rgba(30,55,8,0.9); font-size:9px; font-weight:900; letter-spacing:1.5px;
    border:none; border-radius:14px; padding:8px 22px; cursor:pointer;
    box-shadow:0 4px 12px rgba(106,220,56,0.45); transition:transform 0.1s; }
  .start-btn:hover { transform:scale(1.06); }
  .start-btn:active { transform:scale(0.96); }

  /* ── 오른쪽 버튼 영역 ── */
  .right-panel { position:absolute; right:16px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px; }
  .btn { width:32px; height:32px; border-radius:50%;
    background:linear-gradient(145deg,#f4f4ec,#d6d6ca); border:none; cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.20), inset 0 1px 3px rgba(255,255,255,0.72), inset 0 -1px 3px rgba(0,0,0,0.14);
    transition:all 0.08s; flex-shrink:0; }
  .btn:active { box-shadow:0 1px 4px rgba(0,0,0,0.2), inset 0 2px 5px rgba(0,0,0,0.22); transform:scale(0.94); }
  .btn-divider { width:24px; height:1px; background:rgba(40,70,10,0.15); }
  .next-btn { width:32px; height:32px; border-radius:50%;
    background:linear-gradient(145deg,#f4f4ec,#d6d6ca);
    border:2px solid rgba(40,70,10,0.28);
    cursor:pointer; font-size:8px; font-weight:900; color:rgba(40,70,10,0.7);
    box-shadow:0 4px 8px rgba(0,0,0,0.20), inset 0 1px 3px rgba(255,255,255,0.72), inset 0 -1px 3px rgba(0,0,0,0.14);
    transition:all 0.08s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .next-btn:hover { background:linear-gradient(145deg,#e4f4cc,#c4e080); border-color:rgba(40,70,10,0.5); }
  .next-btn:active { box-shadow:0 1px 4px rgba(0,0,0,0.2), inset 0 2px 5px rgba(0,0,0,0.22); transform:scale(0.94); }
  .day-label { font-size:7px; font-weight:900; color:rgba(40,70,10,0.55);
    font-family:'Nunito',sans-serif; letter-spacing:.5px; white-space:nowrap; }

  /* speaker */
  .reset-btn { width:32px; height:32px; border-radius:50%;
    background:linear-gradient(145deg,#f4f4ec,#d6d6ca);
    border:2px solid rgba(180,60,60,0.30);
    cursor:pointer; font-size:8px; font-weight:900; color:rgba(160,40,40,0.7);
    box-shadow:0 4px 8px rgba(0,0,0,0.20), inset 0 1px 3px rgba(255,255,255,0.72), inset 0 -1px 3px rgba(0,0,0,0.14);
    transition:all 0.08s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .reset-btn:hover { background:linear-gradient(145deg,#fce8e8,#f0c0c0); border-color:rgba(180,60,60,0.55); color:rgba(160,40,40,0.9); }
  .reset-btn:active { box-shadow:0 1px 4px rgba(0,0,0,0.2), inset 0 2px 5px rgba(0,0,0,0.22); transform:scale(0.94); }
  .speaker { position:absolute; bottom:18px; left:28px; display:grid; grid-template-columns:repeat(4,5px); grid-template-rows:repeat(2,5px); gap:4px; }
  .speaker-dot { width:5px; height:5px; border-radius:50%; background:rgba(0,0,0,0.16); }
</style>
</head>
<body>
<div class="device-wrapper">
  <div class="device-body"></div>
  <div class="device-face">

    <!-- ── 베젤 & 스크린 ── -->
    <div class="screen-bezel">
      <div class="screen" id="mainScreen">

        <!-- 시작 화면 -->
        <div class="start-screen" id="startScreen">
          <div class="start-title">아크 바이스</div>
          <div class="start-sub">모코콩 키우기</div>
          <button class="start-btn" onclick="goIntro()">시작하기</button>
        </div>

        <!-- 씨앗 화면 -->

<script>
// ──────────────────────────────────────────
//  게임 상태
// ──────────────────────────────────────────
var state = {
  ap:30, apMax:30,
  hunger:80, health:100, affection:0,
  daily:3, dailyMax:3,
  exploring:false,          // 탐험 중 여부
  exploreRewardPending:false // 다음날 탐험 보상 대기
};
var day = 1;
var gameStarted = false;
var toastTimer = null;
var rewardTimer = null;

// ──────────────────────────────────────────
//  시작 시퀀스
// ──────────────────────────────────────────
function goIntro() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('introScreen').classList.remove('hidden');
}

function waterSeed() {
  var overlay = document.getElementById('flashOverlay');
  var seedImg  = document.querySelector('.seed-img');
  var waterBtn = document.querySelector('.water-btn');
  var seedTitle= document.querySelector('.seed-title');
  waterBtn.disabled = true;
  seedTitle.textContent = '✨ 싹이 트고 있어요!';

  // Phase 1: 씨앗 흔들리며 빛남
  seedImg.style.animation = 'none';
  seedImg.style.transition = 'transform 0.1s';
  var shk = 0;
  var shakeInterval = setInterval(function(){
    shk++;
    seedImg.style.transform = shk % 2 === 0 ? 'rotate(-6deg) scale(1.05)' : 'rotate(6deg) scale(1.1)';
    if (shk > 8) { clearInterval(shakeInterval); doFlash(); }
  }, 80);

  function doFlash() {
    // Phase 2: 화면 번쩍
    overlay.style.transition = 'opacity 0.2s';
    overlay.style.opacity = '1';
    setTimeout(function(){
      overlay.style.opacity = '0';
      setTimeout(function(){
        overlay.style.opacity = '1';
        setTimeout(function(){
          overlay.style.opacity = '0';
          setTimeout(spawnCharacter, 200);
        }, 120);
      }, 120);
    }, 180);
  }

  function spawnCharacter() {
    // Phase 3: 씨앗 숨기고 게임 화면 등장
    document.getElementById('introScreen').classList.add('hidden');
    document.getElementById('statBar').style.display   = 'flex';
    document.getElementById('screenBody').style.display = 'flex';

    // 캐릭터 emerge 연출
    var cw = document.getElementById('charWrap');
    cw.style.animation = 'none';
    cw.style.opacity = '0';
    cw.style.transform = 'translateX(-50%) scale(0.3)';
    cw.style.filter = 'brightness(20) saturate(0)';
    cw.style.transition = 'none';

    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        cw.style.transition = 'transform 0.7s ease, filter 0.7s ease, opacity 0.7s ease';
        cw.style.transform = 'translateX(-50%) scale(1)';
        cw.style.filter = 'brightness(1)';
        cw.style.opacity = '1';
        setTimeout(function(){
          cw.style.transition = '';
          cw.style.animation = 'float 2.2s ease-in-out infinite';
          gameStarted = true;
          enableButtons();
          render();
          showToast('🌱 모코콩이 태어났어요!');
        }, 750);
      });
    });
  }
}

// ──────────────────────────────────────────
//  버튼 활성화
// ──────────────────────────────────────────
function enableButtons() {
  ['feed','play','explore'].forEach(function(id){
    document.getElementById('btn-'+id).classList.remove('disabled');
  });
}

// ──────────────────────────────────────────
//  행동
// ──────────────────────────────────────────
var ACTIONS = {
  feed:    { ap:5,  dailyCost:1, hunger:+30, health:0,   affection:+10, label:'🍎 냠냠!' },
  play:    { ap:5,  dailyCost:1, hunger:-5,  health:+30, affection:+15, label:'🎮 신난다!' },
  explore: { ap:20, dailyCost:0, hunger:-40, health:-40, affection:+60, label:'🗺️ 탐험 출발!' }
  // 탐험 dailyCost는 남은 교감 횟수 전체 사용 (doAction에서 동적 처리)
};
var growthStage = 1; // 성장 단계 1~5
var lastExploreScore = 0; // 이번 탐험 점수 저장

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function doAction(type) {
  if (!gameStarted) return;
  if (state.exploring) { showToast('탐험 중이에요!'); return; }
  var act = ACTIONS[type];

  if (state.ap < act.ap) { shakeEl('apBox'); showToast('AP 부족!'); return; }

  if (type === 'explore') {
    // 탐험: 남은 교감 횟수 1 이상이면 가능, 전체 소모
    if (state.daily < 1) { showToast('교감 횟수가 없어요!'); return; }
    if (state.health < 20) { showToast('체력 부족!'); return; }
    startExplore();
    return;
  }

  // 먹이기 / 놀아주기
  if (state.daily < act.dailyCost) { showToast('교감 횟수 부족!'); return; }

  state.ap        = clamp(state.ap - act.ap, 0, state.apMax);
  state.daily     = clamp(state.daily - act.dailyCost, 0, state.dailyMax);
  state.hunger    = clamp(state.hunger    + act.hunger,    0, 100);
  state.health    = clamp(state.health    + act.health,    0, 100);
  state.affection = clamp(state.affection + act.affection, 0, 4000);

  var btn = document.getElementById('btn-' + type);
  btn.classList.add('active');
  setTimeout(function(){ btn.classList.remove('active'); }, 200);

  popEl('dailyBox');
  render();
  showToast(act.label);

  // 교감 0 → 일일 보상
  if (state.daily <= 0) {
    setTimeout(showDailyReward, 600);
  }
}

// ── 탐험 출발 연출 ──
function startExplore() {
  var usedDaily = state.daily; // 남은 교감 전체 사용
  lastExploreScore = growthStage + usedDaily; // 탐험 점수 계산

  // 스탯 변경
  state.ap        = clamp(state.ap - 20, 0, state.apMax);
  state.daily     = 0;
  state.hunger    = clamp(state.hunger - 40, 0, 100);
  state.health    = clamp(state.health - 40, 0, 100);
  state.affection = clamp(state.affection + 60, 0, 4000);
  state.exploring = true;
  state.exploreRewardPending = true;

  // 연출 시작
  var overlay = document.getElementById('exploreOverlay');
  overlay.classList.remove('hidden');
  lockSidebar(true);

  var logs = [
    '🌿 모코콩이 탐험을 떠납니다...',
    '남은 교감 ' + usedDaily + '회를 모두 사용합니다',
    '탐험 점수: ' + lastExploreScore + '점',
    '',
    '오늘은 모코콩이\n신나는 여행을 떠나는 날! 🎒',
    '',
    '내일 무사히 돌아올 거예요 ✨'
  ];

  var i = 0;
  var logEl = document.getElementById('exploreLog');
  logEl.textContent = '';

  function showNext() {
    if (i < logs.length) {
      if (logs[i] === '') {
        logEl.textContent += '\n';
      } else {
        logEl.textContent += (i > 0 ? '\n' : '') + logs[i];
      }
      i++;
      setTimeout(showNext, 700);
    } else {
      // 연출 완료 → 탐험 중 상태로
      setTimeout(function() {
        overlay.classList.add('hidden');
        document.getElementById('charWrap').style.display = 'none';
        document.getElementById('charShadow').style.display = 'none';
        document.getElementById('exploringMsg').style.display = 'block';
        render();
        showToast('🗺️ 탐험 출발!');
      }, 600);
    }
  }
  showNext();
  render();
}

// ──────────────────────────────────────────
//  일일 보상 (교감 0 달성)
// ──────────────────────────────────────────
var dailyRewards = [
  { emoji:'⭐', text:'AP +5',    apply:function(){ state.ap = clamp(state.ap+5, 0, state.apMax); } },
  { emoji:'💎', text:'친밀도 +50', apply:function(){ state.affection = clamp(state.affection+50, 0, 4000); } },
  { emoji:'🍀', text:'배부름 +20', apply:function(){ state.hunger = clamp(state.hunger+20, 0, 100); } },
  { emoji:'🌟', text:'체력 +20',   apply:function(){ state.health = clamp(state.health+20, 0, 100); } }
];
function showDailyReward() {
  var r = dailyRewards[Math.floor(Math.random() * dailyRewards.length)];
  document.getElementById('rewardTitle').textContent = '일일 보상 획득';
  document.getElementById('rewardItems').textContent = '하루 교감 횟수 충족';
  document.getElementById('rewardSub').textContent   = '소지품으로 이동';
  var popup = document.getElementById('rewardPopup');
  popup.classList.add('show');
  popup.onclick = function() {
    popup.classList.remove('show');
    r.apply();
    render();
  };
}

// ──────────────────────────────────────────
//  탐험 보상 (랜덤)
// ──────────────────────────────────────────
// ── 탐험 귀환 연출 + 점수 기반 보상 ──
var REWARD_TABLE = [
  // { minScore, maxScore, grade, log, emoji, text, apply }
  { grade:'전설', minScore:7, log:'✨ 반짝이는 전설 상자 발견!',      emoji:'🌟', text:'특별한 보물을 발견했어요', apply:function(){ state.affection=clamp(state.affection+200,0,4000); state.ap=clamp(state.ap+15,0,state.apMax); } },
  { grade:'희귀', minScore:5, log:'💎 빛나는 보물 상자를 발견했어요!', emoji:'💎', text:'빛나는 보물을 가져왔어요', apply:function(){ state.affection=clamp(state.affection+120,0,4000); state.health=clamp(state.health+30,0,100); } },
  { grade:'일반', minScore:3, log:'🎒 낡은 가방을 발견했어요…',       emoji:'⭐', text:'소소한 수확을 했어요',   apply:function(){ state.ap=clamp(state.ap+10,0,state.apMax); state.hunger=clamp(state.hunger+30,0,100); } },
  { grade:'하급', minScore:0, log:'🍂 수상한 흔적을 발견했어요…',     emoji:'🍀', text:'무사히 돌아왔어요',      apply:function(){ state.health=clamp(state.health+20,0,100); state.hunger=clamp(state.hunger+20,0,100); } }
];

function pickReward(score) {
  // 점수에 따라 가중 랜덤 선택
  var weights = [];
  for (var i = 0; i < REWARD_TABLE.length; i++) {
    var r = REWARD_TABLE[i];
    var w = Math.max(0, score - r.minScore + 1);
    weights.push(w);
  }
  var total = weights.reduce(function(a,b){ return a+b; }, 0);
  var rand = Math.random() * total;
  var cum = 0;
  for (var j = 0; j < weights.length; j++) {
    cum += weights[j];
    if (rand < cum) return REWARD_TABLE[j];
  }
  return REWARD_TABLE[REWARD_TABLE.length - 1];
}

function giveExploreReward() {
  var score = lastExploreScore;
  var reward = pickReward(score);

  var returnOverlay = document.getElementById('exploreReturn');
  returnOverlay.classList.remove('hidden');
  var logEl = document.getElementById('returnLog');
  logEl.textContent = '';

  var phase1 = [
    '🌅 모코콩이 돌아왔어요!',
    '',
    '탐험 점수: ' + score + '점',
    '',
    '잠시 후 결과를 확인해요…'
  ];
  var phase2 = [
    '',
    reward.log,
    '',
    '[ 탐험 보상 ]',
    reward.emoji + ' ' + reward.text
  ];

  var i = 0;
  var allLogs = phase1.concat(phase2);

  function showNext() {
    if (i < allLogs.length) {
      var line = allLogs[i];
      logEl.textContent += (i > 0 ? '\n' : '') + line;
      i++;
      var delay = (i <= phase1.length) ? 650 : 800;
      setTimeout(showNext, delay);
    } else {
      // 보상 적용 버튼
      setTimeout(function(){
        returnOverlay.classList.add('hidden');
        reward.apply();
        render();
        // 팝업 표시
        document.getElementById('rewardTitle').textContent  = '탐험 보상';
        document.getElementById('rewardItems').textContent = reward.text;
        document.getElementById('rewardSub').textContent   = '소지품으로 이동';
        var popup = document.getElementById('rewardPopup');
        popup.classList.add('show');
        popup.onclick = function(){
          popup.classList.remove('show');
          lastExploreScore = 0;
          lockSidebar(false);
          render();
        };
      }, 800);
    }
  }
  showNext();
}

// ──────────────────────────────────────────
//  다음날
// ──────────────────────────────────────────
function nextDay() {
  if (!gameStarted) return;
  day++;
  document.getElementById('dayDisplay').textContent = 'DAY ' + day;

  // 탐험 귀환 처리
  if (state.exploring) {
    state.exploring = false;
    state.exploreRewardPending = false;
    // 탐험 중 UI 제거
    document.getElementById('exploringMsg').style.display = 'none';
    document.getElementById('exploreOverlay').classList.add('hidden');
    // 캐릭터 복귀
    document.getElementById('charWrap').style.display = 'block';
    document.getElementById('charShadow').style.display = 'block';
    // 귀환 연출 중엔 사이드바 잠금 유지 → giveExploreReward 내부에서 해제
    setTimeout(giveExploreReward, 400);
  }

  // 일일 패널티
  state.hunger = clamp(state.hunger - 20, 0, 100);
  state.health = clamp(state.health - 10, 0, 100);

  // AP / 교감 리셋
  state.ap    = state.apMax;
  state.daily = state.dailyMax;

  popEl('nextBtn');
  render();
  showToast('DAY ' + day + ' 시작!');
}

// ──────────────────────────────────────────
//  사이드바 잠금
// ──────────────────────────────────────────
function lockSidebar(lock) {
  ['feed','play','explore'].forEach(function(id){
    document.getElementById('btn-'+id).classList.toggle('disabled', lock);
  });
}

// ──────────────────────────────────────────
//  렌더
// ──────────────────────────────────────────
function render() {
  document.getElementById('apVal').textContent = state.ap;
  document.getElementById('fillHunger').style.width = state.hunger + '%';
  document.getElementById('fillHealth').style.width  = state.health + '%';
  document.getElementById('numHunger').textContent   = state.hunger;
  document.getElementById('numHealth').textContent   = state.health;


  // 성장 단계별 누적 친밀도 기준
  // 1단계: 0~499 / 2단계: 500~1499 / 3단계: 1500~2799 / 4단계: 2800~3999 / 5단계: 4000
  var STAGE_THRESHOLDS = [0, 500, 1500, 2800, 4000];
  var aff = state.affection;

  // 현재 단계 (1~5)
  var currentStage = 1;
  for (var s = 1; s < STAGE_THRESHOLDS.length; s++) {
    if (aff >= STAGE_THRESHOLDS[s]) currentStage = s + 1;
  }
  currentStage = Math.min(5, currentStage);

  // 현재 단계 구간 내 게이지 진행도
  var stageStart = STAGE_THRESHOLDS[currentStage - 1];
  var stageEnd   = currentStage < 5 ? STAGE_THRESHOLDS[currentStage] : 4000;
  var stageProgress = aff >= 4000 ? 100
    : Math.round((aff - stageStart) / (stageEnd - stageStart) * 100);

  // 단계 배지 업데이트
  document.getElementById('affStageBadge').textContent = currentStage + '단계';

  // 하트 5개 — 각 구간 절반/전체 채움
  // 구간: 1단계(0-499), 2단계(500-1499), 3단계(1500-2799), 4단계(2800-3999), 5단계=4000
  // 하트 1: 0~249=0%, 250~499=50%, 500+=100%
  // 하트 2: 500~999=0%, 1000~1499=50%, 1500+=100%
  // 하트 3: 1500~2149=0%, 2150~2799=50%, 2800+=100%
  // 하트 4: 2800~3399=0%, 3400~3999=50%, 4000+=100%
  // 하트 5: 4000=100%
  var HEART_RANGES = [
    { empty:0,   half:250,  full:500  },
    { empty:500, half:1000, full:1500 },
    { empty:1500,half:2150, full:2800 },
    { empty:2800,half:3400, full:4000 },
    { empty:4000,half:4000, full:4000 }
  ];
  for (var h = 0; h < 5; h++) {
    var hr = HEART_RANGES[h];
    var pct = 0;
    if (aff >= hr.full) {
      pct = 100;
    } else if (aff >= hr.half) {
      pct = 50;
    } else {
      pct = 0;
    }
    document.getElementById('hf' + h).style.width = pct + '%';
  }

  // 미니 게이지 (현재 단계 내 진행도)
  document.getElementById('affMiniFill').style.width = stageProgress + '%';

  // 교감
  document.getElementById('dailyVal').textContent = state.daily;

  // 버튼 비활성 조건
  if (gameStarted && !state.exploring) {
    document.getElementById('btn-feed').classList.toggle('disabled', state.ap < 5  || state.daily < 1);
    document.getElementById('btn-play').classList.toggle('disabled', state.ap < 5  || state.daily < 1);
    document.getElementById('btn-explore').classList.toggle('disabled', state.ap < 20 || state.daily < 1 || state.health < 20);
  }
}

// ──────────────────────────────────────────
//  유틸
// ──────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1400);
}
function shakeEl(id) {
  var el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function(){ el.classList.remove('shake'); }, 400);
}
function resetGame() {
  // 상태 초기화
  state.ap=30; state.apMax=30;
  state.hunger=80; state.health=100; state.affection=0;
  state.daily=3; state.dailyMax=3;
  state.exploring=false; state.exploreRewardPending=false;
  day=1; gameStarted=false;
  weeklyExplore=3;

  // UI 초기화
  document.getElementById('dayDisplay').textContent = 'DAY 1';
  document.getElementById('statBar').style.display   = 'none';
  document.getElementById('screenBody').style.display = 'none';
  document.getElementById('rewardPopup').classList.remove('show');
  document.getElementById('exploringMsg').style.display = 'none';
  document.getElementById('exploreOverlay').classList.add('hidden');
  document.getElementById('exploreReturn').classList.add('hidden');
  lastExploreScore = 0; growthStage = 1;
  document.getElementById('charWrap').style.display = 'block';
  document.getElementById('charShadow').style.display = 'block';
  document.getElementById('charWrap').style.animation = 'float 2.2s ease-in-out infinite';

  lastExploreScore = 0; growthStage = 1;

  // 물주기 버튼 & 씨앗 UI 복원
  var waterBtn = document.querySelector('.water-btn');
  var seedImg  = document.querySelector('.seed-img');
  var seedTitle = document.querySelector('.seed-title');
  if (waterBtn)  { waterBtn.disabled = false; }
  if (seedImg)   { seedImg.style.transform = ''; seedImg.style.animation = 'seedFloat 2s ease-in-out infinite'; }
  if (seedTitle) { seedTitle.textContent = '씨앗이 기다리고 있어요'; }
  var flashOverlay = document.getElementById('flashOverlay');
  if (flashOverlay) { flashOverlay.style.opacity = '0'; }

  // 캐릭터 스타일 완전 초기화
  var cw = document.getElementById('charWrap');
  cw.style.transition = '';
  cw.style.opacity    = '1';
  cw.style.transform  = '';
  cw.style.filter     = '';
  cw.style.animation  = 'float 2.2s ease-in-out infinite';

  // 시작 화면으로
  document.getElementById('introScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

function popEl(id) {
  var el = document.getElementById(id);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(function(){ el.classList.remove('pop'); }, 250);
}
</script>
